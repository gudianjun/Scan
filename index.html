<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>条码扫描记录</title>
  <!-- 本地引用，与 index.html 同目录 -->
  <script src="html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "Helvetica Neue", "Hiragino Sans", "Microsoft YaHei", sans-serif;
      background: #0F172A;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #1E293B;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 { font-size: 20px; margin-bottom: 4px; color: #F97316; text-align: center; }
    .sub { font-size: 12px; color: #64748B; text-align: center; margin-bottom: 20px; }
    label { display: block; font-size: 14px; margin-bottom: 8px; color: #94A3B8; }
    input[type=text], input[type=url] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0F172A;
      color: #E2E8F0;
      font-size: 16px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:active { opacity: .8; }
    button:disabled { opacity: .5; cursor: default; }
    .btn-primary { background: #F97316; color: #fff; }
    .btn-ghost { background: transparent; color: #94A3B8; border: 1px solid #334155; margin-top: 10px; }
    .btn-danger { background: #475569; color: #E2E8F0; }
    .btn-torch { background: #334155; color: #FDE68A; margin-top: 10px; }
    .btn-torch.on { background: #CA8A04; color: #1F2937; }
    .hidden { display: none !important; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 12px; background:#000; }
    .user-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; color: #94A3B8; margin-bottom: 16px;
    }
    .user-bar b { color: #E2E8F0; }
    .result-box {
      background: #0F172A; border: 1px solid #334155; border-radius: 12px;
      padding: 18px; margin-bottom: 16px;
    }
    .result-box .code {
      font-size: 18px; font-weight: 700; color: #F97316;
      word-break: break-all; margin: 8px 0;
    }
    .result-box .meta { font-size: 13px; color: #94A3B8; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row button { margin: 0; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #16A34A; color: #fff; padding: 12px 20px; border-radius: 10px;
      font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none;
      z-index: 999; max-width: 90%; text-align: center;
    }
    .toast.show { opacity: 1; }
    .toast.err { background: #DC2626; }
    .hint { font-size: 13px; color: #64748B; text-align: center; margin-top: 8px; }
    .field-hint { font-size: 12px; color: #64748B; margin: -10px 0 16px; }
    .divider { display:flex; align-items:center; color:#475569; font-size:12px; margin:14px 0; }
    .divider::before, .divider::after { content:""; flex:1; height:1px; background:#334155; }
    .divider span { padding:0 10px; }
  </style>
</head>
<body>

  <!-- 第一步：配置 GAS 地址 + 用户名 -->
  <div class="card" id="step-login">
    <h1>条码扫描记录</h1>
    <div class="sub">扫描后自动写入 Google 表格</div>

    <label for="execUrl">GAS Web App 地址</label>
    <input type="url" id="execUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
    <div class="field-hint">由客户提供，以 /exec 结尾</div>

    <label for="username">用户名</label>
    <input type="text" id="username" placeholder="任意名称" autocomplete="off">

    <button class="btn-primary" onclick="enterApp()">进入</button>
    <button class="btn-ghost" onclick="testConn()" id="test-btn">测试连接</button>
  </div>

  <!-- 第二步：扫描界面 -->
  <div class="card hidden" id="step-scan">
    <div class="user-bar">
      <span>当前用户：<b id="user-display"></b></span>
      <span style="cursor:pointer;color:#F97316" onclick="logout()">设置</span>
    </div>

    <!-- 扫描就绪 -->
    <div id="scan-idle">
      <button class="btn-primary" onclick="startScan()">📷 开始扫描</button>
      <p class="hint">支持条形码与二维码，自动识别类型</p>

      <div class="divider"><span>识别困难时</span></div>
      <!-- iOS 暗光/小码兜底：调系统相机拍照后解码 -->
      <button class="btn-ghost" onclick="document.getElementById('photoInput').click()">📸 拍照识别</button>
      <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden">
      <p class="hint">用系统相机拍清晰一张，成功率更高</p>
    </div>

    <!-- 扫描中 -->
    <div id="scan-active" class="hidden">
      <div id="reader"></div>
      <button class="btn-torch hidden" id="torch-btn" onclick="toggleTorch()">💡 手电筒</button>
      <button class="btn-danger" onclick="stopScan()" style="margin-top:10px">停止</button>
    </div>

    <!-- 扫描成功：确认 -->
    <div id="scan-result" class="hidden">
      <div class="result-box">
        <div class="meta">识别到内容：</div>
        <div class="code" id="result-code"></div>
        <div class="meta" id="result-type"></div>
      </div>
      <div class="btn-row">
        <button class="btn-danger" onclick="cancelResult()">取消</button>
        <button class="btn-primary" onclick="submitResult()" id="submit-btn">提交</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var LS_URL = 'scanner_exec_url';
    var LS_NAME = 'scanner_user_name';

    var currentUser = '';
    var execUrl = '';
    var html5Qr = null;
    var pendingCode = '';
    var torchOn = false;

    // 限定码制范围：减少误判、提升命中。延迟求值，避免库未加载完就引用全局变量报错
    function getFormats() {
      return [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.CODABAR,
        Html5QrcodeSupportedFormats.DATA_MATRIX
      ];
    }

    // 库是否已加载就绪
    function libReady() {
      return typeof Html5Qrcode !== 'undefined'
          && typeof Html5QrcodeSupportedFormats !== 'undefined';
    }

    // 启动时回填上次的地址和名字
    (function init() {
      var savedUrl = localStorage.getItem(LS_URL);
      var savedName = localStorage.getItem(LS_NAME);
      if (savedUrl) document.getElementById('execUrl').value = savedUrl;
      if (savedName) document.getElementById('username').value = savedName;
    })();

    function readInputs() {
      return {
        url: document.getElementById('execUrl').value.trim(),
        name: document.getElementById('username').value.trim()
      };
    }

    function validUrl(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(url);
    }

    function enterApp() {
      var v = readInputs();
      if (!validUrl(v.url)) { showToast('地址无效，需以 /exec 结尾', true); return; }
      if (!v.name) { showToast('请输入用户名', true); return; }

      execUrl = v.url;
      currentUser = v.name;
      localStorage.setItem(LS_URL, v.url);
      localStorage.setItem(LS_NAME, v.name);

      document.getElementById('user-display').textContent = v.name;
      document.getElementById('step-login').classList.add('hidden');
      document.getElementById('step-scan').classList.remove('hidden');
    }

    function postToGas(payload) {
      var target = payload._url || execUrl;
      return fetch(target, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避开 CORS 预检
        body: JSON.stringify(payload)
      }).then(function(r) { return r.json(); });
    }

    function testConn() {
      var v = readInputs();
      if (!validUrl(v.url)) { showToast('地址无效，需以 /exec 结尾', true); return; }
      var btn = document.getElementById('test-btn');
      btn.disabled = true; btn.textContent = '测试中...';
      postToGas({ _url: v.url, action: 'ping' })
        .then(function(res) {
          btn.disabled = false; btn.textContent = '测试连接';
          if (res && res.ok) showToast('连接成功 ✓');
          else showToast('返回异常：' + (res && res.error ? res.error : '未知'), true);
        })
        .catch(function(err) {
          btn.disabled = false; btn.textContent = '测试连接';
          showToast('连接失败：' + err, true);
        });
    }

    function logout() {
      stopScan();
      document.getElementById('step-scan').classList.add('hidden');
      document.getElementById('step-login').classList.remove('hidden');
      resetToIdle();
    }

    function resetToIdle() {
      document.getElementById('scan-idle').classList.remove('hidden');
      document.getElementById('scan-active').classList.add('hidden');
      document.getElementById('scan-result').classList.add('hidden');
    }

    // 自适应扫描框：取画面较小边的 70%，正方形，兼顾二维码与条形码
    function qrboxFn(vw, vh) {
      var minEdge = Math.min(vw, vh);
      var size = Math.floor(minEdge * 0.7);
      return { width: size, height: size };
    }

    function startScan() {
      if (!libReady()) { showToast('扫描库加载中，请稍候重试', true); return; }
      document.getElementById('scan-idle').classList.add('hidden');
      document.getElementById('scan-result').classList.add('hidden');
      document.getElementById('scan-active').classList.remove('hidden');

      // 实例配置：优先原生 BarcodeDetector（iOS 不支持会自动回退到 ZXing），限定码制
      html5Qr = new Html5Qrcode('reader', {
        formatsToSupport: getFormats(),
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      });

      var config = {
        fps: 15,
        qrbox: qrboxFn,
        aspectRatio: 1.0,
        // 高分辨率 + 连续对焦：iOS 上提升识别率最有效的手段
        videoConstraints: {
          facingMode: 'environment',
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          focusMode: 'continuous',
          advanced: [{ focusMode: 'continuous' }]
        }
      };

      html5Qr.start(
        undefined,        // 用 videoConstraints 里的 facingMode 选摄像头
        config,
        onScanSuccess,
        function(err) { /* 每帧未识别，忽略 */ }
      ).then(function() {
        setupTorchButton(); // 启动后检测是否支持手电筒
      }).catch(function(err) {
        showToast('无法打开摄像头：' + err, true);
        resetToIdle();
      });
    }

    // 仅当设备/浏览器支持 torch 时才显示手电筒按钮（iOS 通常不支持，自动隐藏）
    function setupTorchButton() {
      var btn = document.getElementById('torch-btn');
      torchOn = false;
      btn.classList.remove('on');
      btn.textContent = '💡 手电筒';
      try {
        var caps = html5Qr.getRunningTrackCapabilities();
        if (caps && caps.torch) {
          btn.classList.remove('hidden');
        } else {
          btn.classList.add('hidden');
        }
      } catch (e) {
        btn.classList.add('hidden');
      }
    }

    function toggleTorch() {
      if (!html5Qr) return;
      torchOn = !torchOn;
      html5Qr.applyVideoConstraints({ advanced: [{ torch: torchOn }] })
        .then(function() {
          var btn = document.getElementById('torch-btn');
          if (torchOn) { btn.classList.add('on'); btn.textContent = '💡 关闭手电筒'; }
          else { btn.classList.remove('on'); btn.textContent = '💡 手电筒'; }
        })
        .catch(function() {
          torchOn = !torchOn; // 回滚
          showToast('该设备不支持手电筒', true);
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
      pendingCode = decodedText;
      var fmt = (decodedResult && decodedResult.result && decodedResult.result.format)
                ? decodedResult.result.format.formatName : '';
      stopScan(function() {
        showResult(decodedText, fmt);
      });
    }

    function showResult(text, fmt) {
      document.getElementById('result-code').textContent = text;
      document.getElementById('result-type').textContent = fmt ? ('类型：' + fmt) : '';
      document.getElementById('scan-idle').classList.add('hidden');
      document.getElementById('scan-active').classList.add('hidden');
      document.getElementById('scan-result').classList.remove('hidden');
    }

    function stopScan(callback) {
      var btn = document.getElementById('torch-btn');
      if (btn) { btn.classList.add('hidden'); btn.classList.remove('on'); }
      torchOn = false;

      if (html5Qr && html5Qr.getState && typeof Html5QrcodeScannerState !== 'undefined'
          && html5Qr.getState() === Html5QrcodeScannerState.SCANNING) {
        html5Qr.stop().then(function() {
          html5Qr.clear();
          html5Qr = null;
          if (callback) callback();
        }).catch(function() {
          html5Qr = null;
          if (callback) callback();
        });
      } else {
        if (html5Qr) { try { html5Qr.clear(); } catch(e){} html5Qr = null; }
        if (document.getElementById('scan-result').classList.contains('hidden')) {
          resetToIdle();
        }
        if (callback) callback();
      }
    }

    // iOS 兜底：拍照后用 scanFile 解码
    document.getElementById('photoInput').addEventListener('change', function(e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!libReady()) { showToast('扫描库加载中，请稍候重试', true); e.target.value=''; return; }
      var fileScanner = new Html5Qrcode('reader', {
        formatsToSupport: getFormats(),
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      });
      showToast('识别中...');
      fileScanner.scanFile(file, false)
        .then(function(decodedText) {
          fileScanner.clear();
          showResult(decodedText, '图片识别');
        })
        .catch(function(err) {
          try { fileScanner.clear(); } catch(ex){}
          showToast('未能识别，请靠近、对焦后重拍', true);
        });
      e.target.value = ''; // 允许重复选同一文件
    });

    function cancelResult() {
      pendingCode = '';
      resetToIdle();
    }

    function submitResult() {
      var btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = '提交中...';
      postToGas({ action: 'append', name: currentUser, code: pendingCode })
        .then(function(res) {
          btn.disabled = false; btn.textContent = '提交';
          if (res && res.ok) {
            showToast('已提交：' + res.code);
            resetToIdle();
          } else {
            showToast('提交失败：' + (res && res.error ? res.error : '未知错误'), true);
          }
        })
        .catch(function(err) {
          btn.disabled = false; btn.textContent = '提交';
          showToast('提交失败：' + err, true);
        });
    }

    var toastTimer = null;
    function showToast(msg, isErr) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isErr ? ' err' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() {
        t.className = 'toast' + (isErr ? ' err' : '');
      }, 2800);
    }

    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') enterApp();
    });
  </script>
</body>
</html>
